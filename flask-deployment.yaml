apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: smartops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
        - name: flask-app
          image: adnan1978/smartops-flask-app:1.1
          ports:
            - containerPort: 5000
          env:
            - name: BACKEND_API_URL
              value: "http://smartops-backend-service.smartops.svc.cluster.local"



